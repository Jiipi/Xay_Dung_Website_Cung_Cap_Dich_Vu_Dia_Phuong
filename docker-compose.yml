services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dalat-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf
    env_file:
      - .env.docker
    depends_on:
      - postgres

  nginx:
    image: nginx:alpine
    container_name: dalat-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: dalat-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dalat_services
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - dalat_pgdata:/var/lib/postgresql/data

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: dalat-cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      - postgres

volumes:
  dalat_pgdata:
  cloudbeaver_data:
